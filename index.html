<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guia Prático de Metas SMART | RH - Cury</title>
    <link rel="icon" href="icone.png" type="image/png">
    <link rel="shortcut icon" href="icone.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; 
            background-color: #f3f4f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }

        #canvas-container {
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
            overflow: hidden;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #main-image {
            max-width: none;
            width: 1920px; 
            transform-origin: center center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 640px) {
            .hide-on-mobile { display: none; }
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div id="start-overlay" class="fixed inset-0 z-[100] bg-white/70 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl flex flex-col items-center max-w-lg w-11/12 text-center border border-slate-200 transform transition-transform">
            
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-6 animate-bounce">
                <i data-lucide="play" class="w-10 h-10 ml-1"></i>
            </div>
            
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800 mb-3">Guia Prático de Metas SMART</h1>
            <p class="text-slate-500 mb-8">Bem-vindo(a) ao guia interativo de Metas SMART. Escolha como deseja iniciar a apresentação.</p>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
                <button onclick="startPresentation(true)" class="px-6 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-bold text-base transition-transform hover:scale-105 active:scale-95 shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2 w-full sm:flex-1">
                    <i data-lucide="volume-2" class="w-5 h-5"></i>
                    Com Áudio
                </button>
                <button onclick="startPresentation(false)" class="px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 rounded-full font-bold text-base transition-transform hover:scale-105 active:scale-95 shadow-sm flex items-center justify-center gap-2 w-full sm:flex-1">
                    <i data-lucide="volume-x" class="w-5 h-5"></i>
                    Sem Áudio
                </button>
            </div>
            
        </div>
    </div>

    <a href="https://biblioteca-de-metodologias-rh-cury.vercel.app/" class="fixed top-4 left-4 z-[999] bg-white/90 backdrop-blur-sm border border-slate-200 px-4 py-2 rounded-xl shadow-md flex items-center gap-2 hover:bg-slate-50 text-slate-700 transition-all font-medium text-sm">
        <i data-lucide="library" class="w-4 h-4 text-blue-600"></i>
        <span class="hide-on-mobile">Biblioteca</span>
    </a>

    <button onclick="toggleFullScreen()" class="fixed top-4 right-4 z-[999] bg-white/90 backdrop-blur-sm border border-slate-200 px-4 py-2 rounded-xl shadow-md flex items-center gap-2 hover:bg-slate-50 text-slate-700 transition-all font-medium text-sm">
        <i data-lucide="maximize" id="fullscreen-icon" class="w-4 h-4 text-blue-600"></i>
        <span class="hide-on-mobile" id="fullscreen-text">Tela Cheia</span>
    </button>

    <div id="canvas-container" class="bg-[#f3f4f6]">
        <img id="main-image" src="./metas.png" alt="Mapa Mental Metas SMART">
        
        <div id="blur-overlay" class="absolute inset-0 bg-[#f3f4f6]/85 backdrop-blur-md opacity-0 transition-opacity duration-1000 z-10 pointer-events-none"></div>
        <img id="img-capa" src="capa.png" alt="Capa Metas SMART" class="absolute max-w-5xl w-11/12 max-h-[85%] object-contain opacity-0 transition-all duration-1000 scale-95 z-20 pointer-events-none">
    </div>

    <div class="min-h-[80px] bg-white border-t border-slate-200 px-2 md:px-8 w-full flex flex-col md:flex-row items-center justify-between shrink-0 shadow-[0_-4px_15px_rgba(0,0,0,0.02)] z-50 relative py-3 md:py-0 gap-3 md:gap-0">
        
        <div class="w-1/4 hidden md:block"></div>

        <div class="flex-1 flex w-full md:w-auto justify-center items-center gap-1 md:gap-3">
            <button onclick="scrollCarousel(-1)" class="p-1 md:p-2 rounded-full text-slate-400 hover:text-blue-600 hover:bg-slate-100 transition-colors shrink-0">
                <i data-lucide="chevron-left" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>

            <div class="flex items-center justify-start gap-2 overflow-x-auto no-scrollbar py-2 scroll-smooth w-[260px] md:w-[380px]" id="pagination-container">
            </div>

            <button onclick="scrollCarousel(1)" class="p-1 md:p-2 rounded-full text-slate-400 hover:text-blue-600 hover:bg-slate-100 transition-colors shrink-0">
                <i data-lucide="chevron-right" class="w-4 h-4 md:w-5 md:h-5"></i>
            </button>
        </div>

        <div class="flex items-center justify-center md:justify-end w-full md:w-1/4">
            <div class="flex flex-col items-center md:items-end w-[90%] md:w-auto">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest md:mr-1 mb-0.5">Narração</span>
                <audio id="presentation-audio" src="./audio.mp3" controls class="h-8 md:h-10 w-full md:w-64 outline-none rounded-lg bg-slate-50"></audio>
            </div>
        </div>
    </div>

    <div id="global-tooltip" class="fixed z-[120] px-3 py-1.5 bg-slate-800 text-white text-xs md:text-sm whitespace-nowrap rounded-lg shadow-xl pointer-events-none transition-all duration-200 opacity-0 invisible">
        <span id="global-tooltip-text"></span>
        <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
    </div>

    <script>
        lucide.createIcons();

        let panzoom;
        const elem = document.getElementById('main-image');
        
        const BASE_WIDTH = 1920;
        const BASE_HEIGHT = 900;

        const steps = [
            { id: 0, title: "1. Capa", scale: 1.73, x: 25, y: 10, time: 0, type: 'capa' },
            { id: 1, title: "2. Visão Geral", scale: 1.73, x: 25, y: 10, time: 28, type: 'geral' },
            { id: 2, title: "3. O DNA de uma Meta SMART", scale: 2.12, x: 248, y: -38, time: 49, type: 'geral' },
            { id: 3, title: "4. S - Específica", scale: 4.24, x: 386, y: 55, time: 67, type: 'geral' },
            { id: 4, title: "5. M - Mensurável", scale: 4.24, x: 104, y: 49, time: 78, type: 'geral' },
            { id: 5, title: "6. A - Alcançável", scale: 4.24, x: 252, y: -60, time: 90, type: 'geral' },
            { id: 6, title: "7. R - Realista", scale: 4.24, x: 395, y: -166, time: 109, type: 'geral' },
            { id: 7, title: "8. T - Temporal", scale: 4.24, x: 113, y: -167, time: 137, type: 'geral' },
            { id: 8, title: "9. Do Genérico ao SMART", scale: 3.84, x: -202, y: 55, time: 161, type: 'geral' },
            { id: 9, title: "10. Checklist de Validação & IA", scale: 4.24, x: -201, y: -140, time: 275, type: 'geral' },
            { id: 10, title: "11. Resumo Geral", scale: 1.73, x: 25, y: 10, time: 348, type: 'geral' },
        ];

        let currentStepIndex = -1;

        function getRatio() {
            const w = window.innerWidth;
            const h = window.innerHeight - 80; 
            const ratioW = w / BASE_WIDTH;
            const ratioH = h / BASE_HEIGHT;
            return Math.min(ratioW, ratioH);
        }

        window.addEventListener('resize', () => {
            if (currentStepIndex >= 0) {
                goToStep(currentStepIndex, false, true);
            }
        });

        function startPresentation(comAudio) {
            const overlay = document.getElementById('start-overlay');
            const audio = document.getElementById('presentation-audio');

            overlay.classList.add('opacity-0');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                
                if (comAudio && audio) {
                    audio.playbackRate = 1.25; 
                    audio.play().catch(e => console.log(e));
                }
            }, 500); 
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fullscreen-icon');
            const text = document.getElementById('fullscreen-text');
            if (document.fullscreenElement) {
                icon.setAttribute('data-lucide', 'minimize');
                text.innerText = 'Sair';
            } else {
                icon.setAttribute('data-lucide', 'maximize');
                text.innerText = 'Tela Cheia';
            }
            lucide.createIcons();
        });

        function initPagination() {
            const container = document.getElementById('pagination-container');
            container.innerHTML = ''; 
            
            container.insertAdjacentHTML('beforeend', '<div class="shrink-0 w-[130px] md:w-[190px]"></div>');

            steps.forEach((step, index) => {
                container.insertAdjacentHTML('beforeend', `
                    <button onclick="goToStep(${index})" 
                            id="page-btn-${index}" 
                            onmouseenter="handleMouseEnter(${index}, this)"
                            onmouseleave="hideGlobalTooltip()"
                            class="relative flex items-center justify-center rounded-full transition-all duration-300 shrink-0">
                        <span id="page-label-${index}" class="transition-all duration-300 whitespace-nowrap font-medium"></span>
                    </button>
                `);
            });

            container.insertAdjacentHTML('beforeend', '<div class="shrink-0 w-[130px] md:w-[190px]"></div>');
            updateUI(); 
        }

        function updateUI() {
            steps.forEach((step, index) => {
                const btn = document.getElementById(`page-btn-${index}`);
                const label = document.getElementById(`page-label-${index}`);
                
                const distance = Math.abs(index - currentStepIndex);
                
                if (distance === 0) {
                    btn.className = "flex items-center justify-center rounded-full transition-all duration-500 bg-blue-600 text-white shadow-md ring-4 ring-blue-100 shrink-0 h-10 px-4 md:px-5 cursor-default";
                    label.innerText = step.title; 
                    label.className = "whitespace-nowrap font-bold text-sm md:text-base";
                } else if (distance === 1) {
                    btn.className = "flex items-center justify-center rounded-full transition-all duration-500 bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-blue-600 shrink-0 h-10 w-10 cursor-pointer";
                    label.innerText = index + 1; 
                    label.className = "font-medium text-sm md:text-base";
                } else if (distance === 2) {
                    btn.className = "flex items-center justify-center rounded-full transition-all duration-500 bg-slate-100/80 text-slate-400 hover:bg-slate-200 hover:text-blue-600 shrink-0 h-8 w-8 cursor-pointer";
                    label.innerText = index + 1; 
                    label.className = "font-medium text-xs";
                } else {
                    btn.className = "flex items-center justify-center rounded-full transition-all duration-500 bg-slate-100/50 text-slate-300 hover:bg-slate-200 hover:text-blue-600 shrink-0 h-6 w-6 cursor-pointer opacity-70 hover:opacity-100";
                    label.innerText = index + 1; 
                    label.className = "font-medium text-[10px]";
                }
            });

            hideGlobalTooltip(); 

            const activeBtn = document.getElementById(`page-btn-${currentStepIndex}`);
            if (activeBtn) {
                setTimeout(() => {
                    activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }, 100); 
            }
        }

        function handleMouseEnter(index, element) {
            if (index !== currentStepIndex) {
                const tooltip = document.getElementById('global-tooltip');
                document.getElementById('global-tooltip-text').innerText = steps[index].title;
                
                const rect = element.getBoundingClientRect();
                
                tooltip.style.left = (rect.left + rect.width / 2) + 'px';
                tooltip.style.top = (rect.top - 8) + 'px'; 
                tooltip.style.transform = 'translate(-50%, -100%)';
                
                tooltip.classList.remove('opacity-0', 'invisible');
            }
        }

        function hideGlobalTooltip() {
            const tooltip = document.getElementById('global-tooltip');
            if (tooltip) tooltip.classList.add('opacity-0', 'invisible');
        }

        function scrollCarousel(direction) {
            const container = document.getElementById('pagination-container');
            container.scrollBy({ left: direction * 150, behavior: 'smooth' });
        }

        function goToStep(index, syncAudio = true, skipAnimation = false) {
            if (!panzoom || index < 0 || index >= steps.length) return;
            
            if (currentStepIndex === index && !syncAudio && !skipAnimation) return;

            currentStepIndex = index;
            const step = steps[index];
            
            const currentRatio = getRatio(); 
            const targetScale = step.scale * currentRatio;
            const targetX = step.x * currentRatio; 
            const targetY = step.y * currentRatio; 

            const animProps = { animate: !skipAnimation, duration: skipAnimation ? 0 : 1200 };

            panzoom.zoom(targetScale, animProps);
            panzoom.pan(targetX, targetY, animProps);

            updateUI();

            const blurOverlay = document.getElementById('blur-overlay');
            const imgCapa = document.getElementById('img-capa');

            if (step.type === 'capa') {
                blurOverlay.classList.replace('opacity-0', 'opacity-100');
                imgCapa.classList.replace('opacity-0', 'opacity-100');
                imgCapa.classList.replace('scale-95', 'scale-100');
                imgCapa.classList.add('pointer-events-auto');
            } else {
                blurOverlay.classList.replace('opacity-100', 'opacity-0');
                imgCapa.classList.replace('opacity-100', 'opacity-0');
                imgCapa.classList.replace('scale-100', 'scale-95');
                imgCapa.classList.remove('pointer-events-auto');
            }

            const audio = document.getElementById('presentation-audio');
            if (syncAudio && audio) {
                audio.currentTime = step.time;
            }
        }

        const audioPlayer = document.getElementById('presentation-audio');
        if (audioPlayer) {
            audioPlayer.addEventListener('timeupdate', () => {
                const currentTime = audioPlayer.currentTime;
                let targetStep = 0;

                for (let i = steps.length - 1; i >= 0; i--) {
                    if (currentTime >= steps[i].time) {
                        targetStep = i;
                        break;
                    }
                }

                if (currentStepIndex !== targetStep) {
                    goToStep(targetStep, false); 
                }
            });

            audioPlayer.addEventListener('ended', () => {
                goToStep(0, false);
            });
        }

        function nextStep() {
            if (currentStepIndex < steps.length - 1) {
                goToStep(currentStepIndex + 1);
            } else {
                goToStep(0);
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                goToStep(currentStepIndex - 1);
            }
        }

        window.onload = () => {
            initPagination(); 
            
            if (audioPlayer) {
                audioPlayer.playbackRate = 1.25;
            }
            
            if (elem.complete && elem.naturalHeight !== 0) {
                iniciarPanzoom();
            } else {
                elem.onload = iniciarPanzoom;
                elem.onerror = () => console.error("Erro ao carregar a imagem 'metas.png'.");
            }
        };

        function iniciarPanzoom() {
            panzoom = Panzoom(elem, {
                maxScale: 10,        
                minScale: 0.1,      
                step: 0.15,         
                animate: true,      
                duration: 1200,     
            });

            elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

            const resizeObserver = new ResizeObserver(() => {
                if (currentStepIndex >= 0) {
                    goToStep(currentStepIndex, false, true);
                }
            });
            
            const container = document.getElementById('canvas-container');
            if (container) {
                resizeObserver.observe(container);
            }

            goToStep(0, false, true);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'Space') nextStep();
            if (e.key === 'ArrowLeft') prevStep();
        });

    </script>
</body>
</html>
